<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SignalCheck</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="container">

    <!-- LÁSER -->
    <div id="scanLine" class="scan-line"></div>

    <!-- HEADER -->
    <div class="header">
      <h1>SignalCheck</h1>
      <div class="subtitle">Análisis estructural del contenido</div>
    </div>

    <!-- RESULTADO -->
    <div id="labelBadge" class="signal-label">Iniciando...</div>

    <!-- SCORE -->
    <div class="score-container">
      <div class="score-main">
        <span id="scoreValue">--</span>
        <span class="score-label">/100</span>
      </div>
      <div class="confidence">
        Confianza: <span id="confidenceValue">--</span>%
      </div>
    </div>

    <!-- INSIGHT -->
    <div id="summary" class="hidden insight-box"></div>

    <!-- 🔒 PRO SECTION -->
    <div id="proSection" class="pro-section locked">

      <div class="pro-title">🔍 Análisis avanzado</div>

      <ul class="pro-list">
        <li>Emocionalidad: 🔒</li>
        <li>Manipulación: 🔒</li>
        <li>Evidencia: 🔒</li>
        <li>Coherencia: 🔒</li>
      </ul>

      <!-- ⚠️ WARNING -->
      <div id="proWarning" class="pro-warning">
        ⚠️ Hay señales más profundas que no estás viendo<br>
        Este contenido puede influir en cómo lo interpretás
      </div>

      <!-- 🔓 BOTÓN PRO -->
      <button id="upgradeBtn" class="upgrade-btn">
        🔓 Ver análisis completo
      </button>

    </div>

    <!-- BOTÓN -->
    <button id="analyzeBtn">Re-analizar página</button>

  </div>

  <script src="popup.js"></script>

</body>
</html>
