<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SignalCheck</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <div class="container">

    <h1>SignalCheck</h1>
    <p class="subtitle">Análisis estructural del contenido</p>

    <div id="labelBadge" class="badge">Analizando...</div>

    <div class="score">
      <span id="scoreValue">--</span> /100
    </div>

    <div class="confidence">
      Confianza: <span id="confidenceValue">--</span>%
    </div>

    <div id="summary" class="summary hidden"></div>

    <!-- 🔐 PRO -->
    <div id="proSection" class="pro locked">

      <div id="proWarning" class="warning">
        ⚠ Hay señales más profundas que no estás viendo
      </div>

      <button id="upgradeBtn" class="upgrade-btn">
        🔓 Ver análisis completo
      </button>

    </div>

    <button id="analyzeBtn" class="analyze-btn">
      Re-analizar página
    </button>

  </div>

  <script src="popup.js"></script>

</body>
</html>
